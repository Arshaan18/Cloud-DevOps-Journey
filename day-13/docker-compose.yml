version: '3'

services:
  web:
    build: .
    ports:
      - "8082:80"
    volumes:
      - ./app:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=arshaan
      - DB_PASSWORD=devops123
      - DB_NAME=cafe_db

  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: devops123
      MYSQL_DATABASE: cafe_db
      MYSQL_USER: arshaan
      MYSQL_PASSWORD: devops123
    volumes:
      - cafe-db-data:/var/lib/mysql

volumes:
  cafe-db-data:
